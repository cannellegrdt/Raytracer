# =============================================================================
# Demo Scene Graph - Three spheres grouped and translated together,
# with a nested sub-group of two smaller spheres rotated inside.
# =============================================================================

camera = {
    resolution = { width = 640; height = 480; };
    position = { x = 0.0; y = 2.0; z = -8.0; };
    rotation = { x = 10.0; y = 0.0; z = 0.0; };
    fieldOfView = 60.0;
};

primitives = {
    # Floor plane outside any group
    planes = (
        {
            x = 0.0; y = -2.0; z = 0.0;
            nx = 0.0; ny = 1.0; nz = 0.0;
            material = { type = "flat"; color = { r = 0.5; g = 0.5; b = 0.5; }; };
        }
    );

    groups = (
        # Group 1: two blue spheres translated to the left as a unit
        {
            translation = { x = -3.0; y = 0.0; z = 0.0; };
            children: {
                spheres = (
                    {
                        x = 0.0; y = 0.0; z = 0.0; r = 1.0;
                        material = { type = "flat"; color = { r = 0.2; g = 0.3; b = 0.9; }; };
                    },
                    {
                        x = 0.0; y = 1.8; z = 0.0; r = 0.6;
                        material = { type = "reflection"; color = { r = 0.5; g = 0.5; b = 1.0; }; };
                    }
                );
            };
        },
        # Group 2: red sphere + nested sub-group of two green spheres, all shifted right
        {
            translation = { x = 3.0; y = 0.0; z = 0.0; };
            children: {
                spheres = (
                    {
                        x = 0.0; y = 0.0; z = 0.0; r = 1.0;
                        material = { type = "flat"; color = { r = 0.9; g = 0.2; b = 0.2; }; };
                    }
                );
                # Nested group: two small green spheres rotated around the red one
                groups = (
                    {
                        rotation = { x = 0.0; y = 45.0; z = 0.0; };
                        children: {
                            spheres = (
                                {
                                    x = 1.8; y = 0.8; z = 0.0; r = 0.4;
                                    material = { type = "flat"; color = { r = 0.2; g = 0.85; b = 0.3; }; };
                                },
                                {
                                    x = -1.8; y = 0.8; z = 0.0; r = 0.4;
                                    material = { type = "flat"; color = { r = 0.2; g = 0.85; b = 0.3; }; };
                                }
                            );
                        };
                    }
                );
            };
        }
    );
};

lights = {
    ambient = (
        { color = { r = 1.0; g = 1.0; b = 1.0; }; intensity = 0.2; }
    );
    directional = (
        { direction = { x = -0.5; y = -1.0; z = 0.5; }; color = { r = 1.0; g = 1.0; b = 1.0; }; intensity = 0.8; }
    );
};
