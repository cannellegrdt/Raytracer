# =============================================================================
# TangleCube Demo - Multiple tanglecubes in a classic arrangement
# Demonstrates the tanglecube implicit surface primitive
# =============================================================================

camera = {
    resolution = { width = 800; height = 600; };
    position = { x = 0.0; y = 2.0; z = -8.0; };
    rotation = { x = 15.0; y = 0.0; z = 0.0; };
    fieldOfView = 60.0;
};

primitives = {
    tanglecubes = (
        {
            x = -3.0; y = 0.0; z = 0.0;
            s = 1.5;
            material = { type = "flat"; color = { r = 0.8; g = 0.2; b = 0.2; }; };
        }
    );

    planes = (
        {
            x = 0.0; y = -2.0; z = 0.0;
            nx = 0.0; ny = 1.0; nz = 0.0;
            material = { type = "flat"; color = { r = 0.3; g = 0.3; b = 0.3; }; };
        }
    );
};

lights = {
    ambient = (
        { color = { r = 1.0; g = 1.0; b = 1.0; }; intensity = 0.15; }
    );
    directional = (
        { direction = { x = -0.5; y = -1.0; z = 0.5; }; color = { r = 1.0; g = 1.0; b = 1.0; }; intensity = 0.85; }
    );
};
