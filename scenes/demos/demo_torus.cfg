    # Floor plane
    planes = (
        {
            x = 0.0; y = -3.0; z = 0.0;
            nx = 0.0; ny = 1.0; nz = 0.0;
            material = { type = "flat"; color = { r = 0.6; g = 0.6; b = 0.6; }; };
        }
    );
};

