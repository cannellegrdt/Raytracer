        {
            x = 0.0; y = 2.5; z = 0.0;
            ax = 0.0; ay = 1.0; az = 0.0;
            R = 3.0; r = 0.2;
            material = { type = "flat"; color = { r = 0.8; g = 0.4; b = 0.8; }; };
        },
        # Small torus with large tube (will be auto-corrected if r > R)
        {
            x = 0.0; y = -2.0; z = 0.0;
            ax = 0.0; ay = 1.0; az = 0.0;
            R = 0.8; r = 0.6;
            material = { type = "flat"; color = { r = 0.2; g = 0.8; b = 0.8; }; };
        }
