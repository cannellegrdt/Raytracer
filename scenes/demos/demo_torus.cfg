# Demo scene: multiple classic torus primitives
# Showcases various torus configurations with different positions, orientations, and sizes

camera = {
    resolution = { width = 800; height = 600; };
    position = { x = 0.0; y = 3.0; z = -10.0; };
    rotation = { x = 15.0; y = 0.0; z = 0.0; };
    fieldOfView = 60.0;
};

primitives = {
    # Torus with vertical axis (default orientation)
    torus = (
        {
            x = -3.0; y = 0.0; z = 0.0;
            ax = 0.0; ay = 1.0; az = 0.0;
            R = 2.0; r = 0.5;
            material = { type = "flat"; color = { r = 1.0; g = 0.2; b = 0.2; }; };
        },
        # Torus with horizontal axis (X-axis)
        {
            x = -1.0; y = 0.0; z = 0.0;
            ax = 1.0; ay = 0.0; az = 0.0;
            R = 1.5; r = 0.4;
            material = { type = "flat"; color = { r = 0.2; g = 0.8; b = 0.2; }; };
        },
        # Torus with horizontal axis (Z-axis)
        {
            x = 1.0; y = 0.0; z = 0.0;
            ax = 0.0; ay = 0.0; az = 1.0;
            R = 1.5; r = 0.4;
            material = { type = "flat"; color = { r = 0.2; g = 0.2; b = 1.0; }; };
        },
        # Torus with diagonal axis
        {
            x = 3.0; y = 0.0; z = 0.0;
            ax = 1.0; ay = 1.0; az = 0.0;
            R = 1.8; r = 0.3;
            material = { type = "flat"; color = { r = 1.0; g = 1.0; b = 0.2; }; };
        },
