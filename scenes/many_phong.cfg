# =============================================================================
# Multiple Phong Spheres - Demonstrate Phong shading with multiple materials
# Different shininess values show various specular highlight sizes
# =============================================================================

camera = {
    resolution = { width = 1280; height = 720; };
    position = { x = 0.0; y = 2.0; z = -8.0; };
    rotation = { x = -0.15; y = 0.0; z = 0.0; };
    fieldOfView = 60.0;
};

primitives = {
    spheres = (
        {
            x = -3.0; y = 0.0; z = 3.0;
            r = 1.0;
            material = {
                type = "phong";
                color = { r = 1.0; g = 0.2; b = 0.2; };
                specular = { r = 1.0; g = 1.0; b = 1.0; };
                shininess = 8.0;
            };
        },
        {
            x = 0.0; y = 0.0; z = 4.0;
            r = 1.0;
            material = {
                type = "phong";
                color = { r = 0.2; g = 1.0; b = 0.2; };
                specular = { r = 1.0; g = 1.0; b = 1.0; };
                shininess = 32.0;
            };
        },
        {
            x = 3.0; y = 0.0; z = 3.0;
            r = 1.0;
            material = {
                type = "phong";
                color = { r = 0.2; g = 0.2; b = 1.0; };
                specular = { r = 1.0; g = 1.0; b = 1.0; };
                shininess = 128.0;
            };
        }
    );
    planes = (
        {
            x = 0.0; y = -1.5; z = 0.0;
            nx = 0.0; ny = 1.0; nz = 0.0;
            material = { type = "flat"; color = { r = 0.3; g = 0.3; b = 0.3; }; };
        }
    );
};

lights = {
    ambient = (
        { color = { r = 1.0; g = 1.0; b = 1.0; }; intensity = 0.1; }
    );
    point = (
        {
            position = { x = 0.0; y = 5.0; z = -2.0; };
            color = { r = 1.0; g = 1.0; b = 1.0; };
            intensity = 40.0;
        },
        {
            position = { x = -5.0; y = 3.0; z = 2.0; };
            color = { r = 1.0; g = 0.5; b = 0.5; };
            intensity = 10.0;
        },
        {
            position = { x = 5.0; y = 3.0; z = 2.0; };
            color = { r = 0.5; g = 0.5; b = 1.0; };
            intensity = 10.0;
        }
    );
};
