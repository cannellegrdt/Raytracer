# Normal map comparison scene
# Shows the same geometry with and without normal mapping

camera = {
    resolution = { width = 1200; height = 600; };
    position = { x = 0.0; y = 1.0; z = -6.0; };
    rotation = { x = -5.0; y = 0.0; z = 0.0; };
    fieldOfView = 60.0;
};

primitives = {
    spheres = (
        # Left sphere: WITHOUT normal mapping (flat phong)
        {
            x = -2.5; y = 0.5; z = 0.0;
            r = 1.5;
            material = {
                type = "phong";
                color = { r = 0.7; g = 0.7; b = 0.8; };
                specular = { r = 1.0; g = 1.0; b = 1.0; };
                shininess = 32;
            };
        },

        # Right sphere: WITH normal mapping
        {
            x = 2.5; y = 0.5; z = 0.0;
            r = 1.5;
            material = {
                type = "normalmap";
                normalmap = "textures/normal_bump.ppm";
                base = {
                    type = "phong";
                    color = { r = 0.7; g = 0.7; b = 0.8; };
                    specular = { r = 1.0; g = 1.0; b = 1.0; };
                    shininess = 32;
                };
            };
        }
    );

    # Floor
    planes = (
        {
            x = 0.0; y = -1.0; z = 0.0;
            nx = 0.0; ny = 1.0; nz = 0.0;
            material = { type = "flat"; color = { r = 0.5; g = 0.5; b = 0.5; }; };
        }
    );
};

lights = {
    ambient = (
        { color = { r = 1.0; g = 1.0; b = 1.0; }; intensity = 0.1; }
    );
    directional = (
        { direction = { x = -1.0; y = -1.0; z = 0.5; };
          color = { r = 1.0; g = 1.0; b = 1.0; };
          intensity = 0.8; }
    );
};
