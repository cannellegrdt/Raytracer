# Complex scene with multiple primitives using normal mapping
# Demonstrates normal mapping on sphere, cylinder, and plane

camera = {
    resolution = { width = 1920; height = 1080; };
    position = { x = 0.0; y = 2.0; z = -8.0; };
    rotation = { x = -10.0; y = 0.0; z = 0.0; };
    fieldOfView = 55.0;
};

primitives = {
    # Central sphere with normal mapping (stone texture effect)
    spheres = (
        {
            x = 0.0; y = 1.0; z = 0.0;
            r = 1.5;
            material = {
                type = "normalmap";
                normalmap = "textures/normal_stone.ppm";
                base = {
                    type = "phong";
                    color = { r = 0.6; g = 0.6; b = 0.55; };
                    specular = { r = 0.5; g = 0.5; b = 0.5; };
                    shininess = 24;
                };
            };
        }
    );

    # Cylinder with normal mapping (bark effect)
    limited_cylinders = (
        {
            x = -3.0; y = 0.0; z = -1.0;
            ax = 0.0; ay = 1.0; az = 0.0;
            r = 0.4; h = 3.0;
            material = {
                type = "normalmap";
                normalmap = "textures/normal_bark.ppm";
                base = {
                    type = "phong";
                    color = { r = 0.4; g = 0.3; b = 0.2; };
                    specular = { r = 0.2; g = 0.2; b = 0.2; };
                    shininess = 8;
                };
            };
        }
    );

    # Cone with normal mapping (rough surface)
    limited_cones = (
        {
            x = 3.0; y = 0.0; z = -1.0;
            ax = 0.0; ay = 1.0; az = 0.0;
            angle = 0.4; h = 2.5;
            material = {
                type = "normalmap";
                normalmap = "textures/normal_rough.ppm";
                base = {
                    type = "phong";
                    color = { r = 0.8; g = 0.5; b = 0.3; };
                    specular = { r = 0.3; g = 0.3; b = 0.3; };
                    shininess = 16;
                };
            };
        }
    );

    
    planes = (
        # Floor with normal mapping (ground/dirt effect)
        {
            x = 0.0; y = -0.001; z = 0.0;
            nx = 0.0; ny = 1.0; nz = 0.0;
            material = {
                type = "normalmap";
                normalmap = "textures/normal_ground.ppm";
                base = {
                    type = "phong";
                    color = { r = 0.4; g = 0.5; b = 0.3; };
                    specular = { r = 0.1; g = 0.1; b = 0.1; };
                    shininess = 4;
                };
            };
        },

        # Background wall with normal mapping (brick effect)
        {
            x = 0.0; y = 0.0; z = 5.0;
            nx = 0.0; ny = 0.0; nz = -1.0;
            material = {
                type = "normalmap";
                normalmap = "textures/normal_brick.ppm";
                base = {
                    type = "textured";
                    texture = "textures/brick.ppm";
                };
            };
            translation = { x = 0.0; y = 2.0; z = 0.0; };
        }
    );
};

