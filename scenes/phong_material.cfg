# =============================================================================
# Demo Phong Material - Demonstrate Phong shading with specular highlights
# Sphere with Phong material illuminated by a point light
# =============================================================================

camera = {
    resolution = { width = 640; height = 480; };
    position = { x = 0.0; y = 0.0; z = -5.0; };
    rotation = { x = 0.0; y = 0.0; z = 0.0; };
    fieldOfView = 60.0;
};

primitives = {
    spheres = (
        {
            x = 0.0; y = 0.0; z = 0.0;
            r = 1.5;
            material = {
                type = "phong";
                color = { r = 0.8; g = 0.2; b = 0.2; };
                specular = { r = 1.0; g = 1.0; b = 1.0; };
                shininess = 32.0;
            };
        }
    );
    planes = (
        {
            x = 0.0; y = -1.5; z = 0.0;
            nx = 0.0; ny = 1.0; nz = 0.0;
            material = { type = "flat"; color = { r = 0.4; g = 0.4; b = 0.4; }; };
        }
    );
};

lights = {
    ambient = (
        { color = { r = 1.0; g = 1.0; b = 1.0; }; intensity = 0.1; }
    );
    point = (
        {
            position = { x = 3.0; y = 3.0; z = -2.0; };
            color = { r = 1.0; g = 1.0; b = 1.0; };
            intensity = 1.0;
        }
    );
};
