# =============================================================================
# Reflection and Transparency with 8x8 Antialiasing (64 rays per pixel)
# =============================================================================

camera = {
    resolution = { width = 400; height = 300; };
    position = { x = 0.0; y = 1.5; z = -6.0; };
    rotation = { x = -10.0; y = 0.0; z = 0.0; };
    fieldOfView = 55.0;
};

renderer = {
    antialiasing = { samples = 8; };
};

primitives = {
    spheres = (
        {
            x = -1.5; y = 0.0; z = 2.0;
            r = 1.0;
            material = { type = "reflection"; color = { r = 0.9; g = 0.9; b = 1.0; }; };
        },
        {
            x = 1.5; y = 0.0; z = 2.0;
            r = 1.0;
            material = { type = "transparency"; color = { r = 0.3; g = 0.8; b = 0.3; }; };
        },
        {
            x = 0.0; y = 0.0; z = 0.0;
            r = 0.7;
            material = { type = "flat"; color = { r = 0.8; g = 0.2; b = 0.8; }; };
        }
    );

    planes = (
        {
            x = 0.0; y = -1.0; z = 0.0;
            nx = 0.0; ny = 1.0; nz = 0.0;
            material = { type = "flat"; color = { r = 0.6; g = 0.6; b = 0.6; }; };
        }
    );
};

lights = {
    ambient = (
        { color = { r = 1.0; g = 1.0; b = 1.0; }; intensity = 0.15; }
    );
    directional = (
        { direction = { x = 0.3; y = -1.0; z = 0.5; }; color = { r = 1.0; g = 1.0; b = 1.0; }; intensity = 0.85; },
        { direction = { x = -0.8; y = -0.5; z = -0.3; }; color = { r = 0.6; g = 0.7; b = 1.0; }; intensity = 0.4; }
    );
};
