# =============================================================================
# Refraction Test - Glass Sphere with Refraction Material
# Tests Snell-Descartes law implementation
# =============================================================================

background = { r = 0.5; g = 0.7; b = 1.0; };

renderer = {
    antialiasing = { samples = 8; };
};

camera = {
    resolution = { width = 800; height = 600; };
    position = { x = 0.0; y = 0.0; z = -8.0; };
    rotation = { x = 0.0; y = 0.0; z = 0.0; };
    fieldOfView = 60.0;
};

primitives = {
    # Glass sphere (IOR = 1.5)
    spheres = (
        {
            x = 0.0; y = 0.0; z = 5.0; r = 1.5;
            material = { type = "refraction"; color = { r = 0.9; g = 0.95; b = 1.0; }; ior = 1.5; };
        },
        # Water sphere (IOR = 1.33)
        {
            x = -3.0; y = 0.0; z = 4.0; r = 1.0;
            material = { type = "refraction"; color = { r = 0.8; g = 0.9; b = 1.0; }; ior = 1.33; };
        },
        # Diamond sphere (IOR = 2.42)
        {
            x = 3.0; y = 0.0; z = 4.0; r = 1.0;
            material = { type = "refraction"; color = { r = 0.9; g = 0.9; b = 1.0; }; ior = 2.42; };
        }
    );

    # Floor with reflection for contrast
    planes = (
        {
            x = 0.0; y = -2.0; z = 0.0;
            nx = 0.0; ny = 1.0; nz = 0.0;
            material = { type = "reflection"; color = { r = 0.8; g = 0.8; b = 0.8; }; };
        }
    );
};

lights = {
    ambient = (
        { color = { r = 1.0; g = 1.0; b = 1.0; }; intensity = 0.2; }
    );
    directional = (
        { direction = { x = -0.5; y = -1.0; z = 0.5; }; color = { r = 1.0; g = 1.0; b = 0.9; }; intensity = 0.8; }
    );
};
