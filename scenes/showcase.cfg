# =============================================================================
# Raytracer scene configuration
# =============================================================================
# Colors    : r, g, b in [0.0, 1.0]  (Vec3 / Color type)
# Angles    : radians (cone "angle" is the half-angle, must be in (0, pi/2))
# Intensity : positive double
# =============================================================================

# -----------------------------------------------------------------------------
# Camera
# Parameters fed to: Camera(position, rotation, fov, width, height)
# -----------------------------------------------------------------------------
camera:
{
    resolution = { width = 1920; height = 1080; };
    position = { x = 0.0; y = 0.0; z = -5.0; };
    rotation = { x = 0.0; y = 0.0; z = 0.0; };
    fieldOfView = 72.0;
};

# -----------------------------------------------------------------------------
# Primitives
# Every primitive has a "material" group: { type = "..."; color = { r; g; b; }; }
# Material types: "flat", "reflection", "transparency"
# -----------------------------------------------------------------------------
primitives:
{
    # --- Sphere ---
    # configure params: x, y, z (center)   r (radius > 0)
    spheres = (
        {
            x = 0.0; y = 0.0; z = 5.0;
            r = 1.0;
            material = { type = "flat"; color = { r = 1.0; g = 0.2; b = 0.2; }; };
        },
        {
            x = -2.5; y = 0.0; z = 4.0;
            r = 0.8;
            material = { type = "reflection"; color = { r = 0.9; g = 0.9; b = 0.9; }; };
        },
        {
            x = 2.5; y = 0.0; z = 4.0;
            r = 0.8;
            material = { type = "transparency"; color = { r = 0.8; g = 0.9; b = 1.0; }; };
        }
    );

    # --- Plane ---
    # configure params: x, y, z (point on plane)   nx, ny, nz (normal, auto-normalized)
    planes = (
        {
            x = 0.0; y = -1.5; z = 0.0;
            nx = 0.0; ny = 1.0; nz = 0.0;
            material = { type = "flat"; color = { r = 0.8; g = 0.8; b = 0.8; }; };
        }
    );

    # --- Cylinder (infinite) ---
    # configure params: x, y, z (center)   ax, ay, az (axis, auto-normalized)   r (radius > 0)
    cylinders = (
        {
            x = 4.0; y = 0.0; z = 6.0;
            ax = 0.0; ay = 1.0; az = 0.0;
            r = 0.5;
            material = { type = "flat"; color = { r = 0.2; g = 0.8; b = 0.2; }; };
        }
    );

    # --- Limited cylinder ---
    # configure params: same as cylinder + h (height > 0)
    limited_cylinders = (
        {
            x = -4.0; y = -1.5; z = 6.0;
            ax = 0.0; ay = 1.0; az = 0.0;
            r = 0.5;
            h = 2.0;
            material = { type = "reflection"; color = { r = 0.6; g = 0.4; b = 0.9; }; };
        }
    );

    # --- Cone (infinite) ---
    # configure params: x, y, z (apex)   ax, ay, az (axis, auto-normalized)
    #                   angle (half-angle in RADIANS, must be in (0, pi/2))
    cones = (
        {
            x = 0.0; y = 3.0; z = 6.0;
            ax = 0.0; ay = -1.0; az = 0.0;
            angle = 0.5236;
            material = { type = "flat"; color = { r = 1.0; g = 0.6; b = 0.1; }; };
        }
    );

    # --- Limited cone ---
    # configure params: same as cone + h (height > 0)
    limited_cones = (
        {
            x = 3.0; y = 2.0; z = 7.0;
            ax = 0.0; ay = -1.0; az = 0.0;
            angle = 0.3927;
            h = 1.5;
            material = { type = "flat"; color = { r = 0.3; g = 0.7; b = 0.9; }; };
        }
    );
};

# -----------------------------------------------------------------------------
# Lights
# -----------------------------------------------------------------------------
lights:
{
    # --- Ambient light ---
    # Constructor: AmbientLight(color, intensity)
    ambient = (
        {
            color = { r = 1.0; g = 1.0; b = 1.0; };
            intensity = 0.15;
        }
    );

    # --- Directional light ---
    # Constructor: DirectionalLight(direction, color, intensity)
    # "direction" is the direction the light travels (auto-normalized)
    directional = (
        {
            direction = { x = -0.5; y = -1.0; z = 0.5; };
            color = { r = 1.0; g = 0.95; b = 0.9; };
            intensity = 0.85;
        },
        {
            direction = { x = 1.0; y = -0.5; z = -1.0; };
            color = { r = 0.4; g = 0.5; b = 1.0; };
            intensity = 0.3;
        }
    );
};
