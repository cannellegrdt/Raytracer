# =============================================================================
# Sphere with Adaptive Antialiasing - Low Threshold
# Threshold = 0.05 (more sensitive, more pixels refined)
# =============================================================================

camera = {
    resolution = { width = 640; height = 480; };
    position = { x = 0.0; y = 0.0; z = -5.0; };
    rotation = { x = 0.0; y = 0.0; z = 0.0; };
    fieldOfView = 60.0;
};

renderer = {
    antialiasing = { 
        type = "adaptive";
        threshold = 0.05;
        samples = 4;
    };
};

primitives = {
    spheres = (
        {
            x = 0.0; y = 0.0; z = 0.0;
            r = 1.0;
            material = { type = "flat"; color = { r = 0.8; g = 0.2; b = 0.2; }; };
        }
    );
};

lights = {
    ambient = (
        { color = { r = 1.0; g = 1.0; b = 1.0; }; intensity = 0.3; }
    );
    directional = (
        { direction = { x = 0.0; y = -1.0; z = 1.0; }; color = { r = 1.0; g = 1.0; b = 1.0; }; intensity = 0.7; }
    );
};