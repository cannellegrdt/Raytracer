# =============================================================================
# Edge Cases - Tests boundary conditions
# - Zero/negative coordinates
# - Very large and very small objects
# - Extreme field of view
# - Colors at boundaries (0.0 and 1.0)
# =============================================================================

camera = {
    resolution = { width = 640; height = 480; };
    position = { x = 0.0; y = 0.0; z = 0.0; };
    rotation = { x = 0.0; y = 0.0; z = 0.0; };
    fieldOfView = 120.0;  # Very wide FOV
};

primitives = {
    spheres = (
        # At origin (overlapping with camera)
        { x = 0.0; y = 0.0; z = 1.0; r = 0.5; material = { type = "flat"; color = { r = 1.0; g = 0.0; b = 0.0; }; }; },

        # Extremely large sphere
        { x = 50.0; y = 0.0; z = 100.0; r = 300.0; material = { type = "flat"; color = { r = 0.0; g = 1.0; b = 0.0; }; }; },

        # Extremely small sphere
        { x = -1.0; y = 0.0; z = 1.0; r = 0.001; material = { type = "flat"; color = { r = 0.0; g = 0.0; b = 1.0; }; }; },

        # Negative coordinates
        { x = -10.0; y = -10.0; z = -10.0; r = 2.0; material = { type = "flat"; color = { r = 1.0; g = 1.0; b = 0.0; }; }; },

        # Color values exactly at boundaries
        { x = 10.0; y = 0.0; z = 5.0; r = 1.5; material = { type = "flat"; color = { r = 0.0; g = 0.0; b = 0.0; }; }; },
        { x = 12.0; y = 0.0; z = 5.0; r = 1.5; material = { type = "flat"; color = { r = 1.0; g = 1.0; b = 1.0; }; }; }
    );

    planes = (
        { x = 0.0; y = -100.0; z = 0.0; nx = 0.0; ny = 1.0; nz = 0.0; material = { type = "flat"; color = { r = 0.5; g = 0.5; b = 0.5; }; }; }
    );
};

lights = {
    ambient = (
        { color = { r = 0.0; g = 0.0; b = 0.0; }; intensity = 0.0; }  # No ambient
    );
    directional = (
        { direction = { x = 1.0; y = 0.0; z = 0.0; }; color = { r = 1.0; g = 0.0; b = 0.0; }; intensity = 1.0; },
        { direction = { x = 0.0; y = 1.0; z = 0.0; }; color = { r = 0.0; g = 1.0; b = 0.0; }; intensity = 1.0; },
        { direction = { x = 0.0; y = 0.0; z = 1.0; }; color = { r = 0.0; g = 0.0; b = 1.0; }; intensity = 1.0; }
    );
};
