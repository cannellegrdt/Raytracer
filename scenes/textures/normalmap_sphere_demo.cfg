# Normal map demo with a sphere
# Shows how normal mapping perturbs surface normals for realistic lighting

camera = {
    resolution = { width = 800; height = 600; };
    position = { x = 0.0; y = 0.5; z = -4.0; };
    rotation = { x = 0.0; y = 0.0; z = 0.0; };
    fieldOfView = 60.0;
};

primitives = {
    # Sphere with normal map for surface detail
    spheres = (
        {
            x = 0.0; y = 0.5; z = 0.0;
            r = 1.5;
            material = {
                type = "normalmap";
                normalmap = "textures/normal_bump.ppm";
                base = {
                    type = "phong";
                    color = { r = 0.7; g = 0.7; b = 0.8; };
                    specular = { r = 1.0; g = 1.0; b = 1.0; };
                    shininess = 32;
                };
            };
        }
    );

    # Floor plane
    planes = (
        {
            x = 0.0; y = -1.0; z = 0.0;
            nx = 0.0; ny = 1.0; nz = 0.0;
            material = {
                type = "normalmap";
                normalmap = "textures/normal_floor.ppm";
                base = {
                    type = "phong";
                    color = { r = 0.6; g = 0.6; b = 0.6; };
                    specular = { r = 0.3; g = 0.3; b = 0.3; };
                    shininess = 16;
                };
            };
        }
    );
};

lights = {
    ambient = (
        { color = { r = 1.0; g = 1.0; b = 1.0; }; intensity = 0.15; }
    );
    directional = (
        { direction = { x = -0.5; y = -1.0; z = 0.5; };
          color = { r = 1.0; g = 0.95; b = 0.9; };
          intensity = 0.9; }
    );
    point = (
        { position = { x = 2.0; y = 3.0; z = -2.0; };
          color = { r = 1.0; g = 0.8; b = 0.6; };
          intensity = 0.5; }
    );
};
