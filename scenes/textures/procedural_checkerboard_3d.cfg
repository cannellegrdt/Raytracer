# 3D procedural checkerboard
# Shows the 3D nature of the procedural pattern (based on x, y, z coordinates)

camera = {
    resolution = { width = 800; height = 600; };
    position = { x = 4.0; y = 3.0; z = -4.0; };
    rotation = { x = 10.0; y = -30.0; z = 0.0; };
    fieldOfView = 60.0;
};

renderer = {
    antialiasing = { samples = 8; type = "uniform"; };
};

primitives = {
    planes = (
        {
            x = 0.0; y = -1.0; z = 0.0;
            nx = 0.0; ny = 1.0; nz = 0.0;
            material = {
                type = "chessboard";
                colorA = { r = 0.9; g = 0.9; b = 0.9; };
                colorB = { r = 0.2; g = 0.2; b = 0.2; };
                scale = 1.5;
            };
        }
    );

    spheres = (
        {
            x = 0.0; y = 0.0; z = 0.0; r = 1.5;
            material = {
                type = "chessboard";
                colorA = { r = 1.0; g = 0.0; b = 0.0; };
                colorB = { r = 1.0; g = 1.0; b = 1.0; };
                scale = 0.8;
            };
        }
    );
};

lights = {
    ambient = (
        { color = { r = 1.0; g = 1.0; b = 1.0; }; intensity = 0.15; }
    );
    directional = (
        { direction = { x = -1.0; y = -1.0; z = 0.5; }; color = { r = 1.0; g = 1.0; b = 1.0; }; intensity = 0.85; }
    );
    point = (
        { position = { x = 3.0; y = 5.0; z = -2.0; }; color = { r = 1.0; g = 0.8; b = 0.6; }; intensity = 0.3; }
    );
};
