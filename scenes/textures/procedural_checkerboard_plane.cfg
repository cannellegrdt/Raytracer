# Procedural checkerboard on a plane
# Demonstrates the procedural chessboard material with different scales

camera = {
    resolution = { width = 800; height = 600; };
    position = { x = 0.0; y = 2.0; z = -5.0; };
    rotation = { x = 15.0; y = 0.0; z = 0.0; };
    fieldOfView = 60.0;
};

renderer = {
    antialiasing = { samples = 4; type = "uniform"; };
};

primitives = {
    planes = (
        {
            x = 0.0; y = -1.0; z = 0.0;
            nx = 0.0; ny = 1.0; nz = 0.0;
            material = {
                type = "chessboard";
                colorA = { r = 1.0; g = 1.0; b = 1.0; };
                colorB = { r = 0.0; g = 0.0; b = 0.0; };
                scale = 2.0;
            };
        }
    );

    spheres = (
        {
            x = -2.0; y = 0.0; z = 3.0; r = 1.0;
            material = {
                type = "chessboard";
                colorA = { r = 1.0; g = 0.0; b = 0.0; };
                colorB = { r = 1.0; g = 1.0; b = 1.0; };
                scale = 0.5;
            };
        },
        {
            x = 2.0; y = 0.0; z = 3.0; r = 1.0;
            material = {
                type = "chessboard";
                colorA = { r = 0.0; g = 0.5; b = 1.0; };
                colorB = { r = 0.1; g = 0.1; b = 0.3; };
                scale = 1.0;
            };
        }
    );
};

lights = {
    ambient = (
        { color = { r = 1.0; g = 1.0; b = 1.0; }; intensity = 0.2; }
    );
    directional = (
        { direction = { x = -0.5; y = -1.0; z = 0.5; }; color = { r = 1.0; g = 1.0; b = 0.9; }; intensity = 0.8; }
    );
};
