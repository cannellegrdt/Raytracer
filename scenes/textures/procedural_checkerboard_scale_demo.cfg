# Checkerboard scale comparison
# Three spheres with different scales to demonstrate the scale parameter effect

camera = {
    resolution = { width = 1200; height = 400; };
    position = { x = 0.0; y = 1.5; z = -8.0; };
    rotation = { x = 5.0; y = 0.0; z = 0.0; };
    fieldOfView = 50.0;
};

renderer = {
    antialiasing = { samples = 4; type = "uniform"; };
};

primitives = {
    planes = (
        {
            x = 0.0; y = -1.0; z = 0.0;
            nx = 0.0; ny = 1.0; nz = 0.0;
            material = { type = "flat"; color = { r = 0.7; g = 0.7; b = 0.7; }; };
        }
    );

    spheres = (
        {
            x = -3.5; y = 0.0; z = 2.0; r = 1.2;
            material = {
                type = "chessboard";
                colorA = { r = 0.2; g = 0.6; b = 1.0; };
                colorB = { r = 0.9; g = 0.9; b = 0.9; };
                scale = 0.3;
            };
        },
        {
            x = 0.0; y = 0.0; z = 2.0; r = 1.2;
            material = {
                type = "chessboard";
                colorA = { r = 0.2; g = 0.6; b = 1.0; };
                colorB = { r = 0.9; g = 0.9; b = 0.9; };
                scale = 1.0;
            };
        },
        {
            x = 3.5; y = 0.0; z = 2.0; r = 1.2;
            material = {
                type = "chessboard";
                colorA = { r = 0.2; g = 0.6; b = 1.0; };
                colorB = { r = 0.9; g = 0.9; b = 0.9; };
                scale = 3.0;
            };
        }
    );

    # Infinite cylinder with small pattern
    cylinders = (
        {
            x = -5.0; y = -1.0; z = 4.0;
            ax = 0.0; ay = 1.0; az = 0.0;
            r = 0.5;
            material = {
                type = "chessboard";
                colorA = { r = 1.0; g = 0.5; b = 0.0; };
                colorB = { r = 0.1; g = 0.1; b = 0.1; };
                scale = 0.5;
            };
        }
    );

    # Limited cylinder with medium pattern
    limited_cylinders = (
        {
            x = 5.0; y = -1.0; z = 4.0;
            ax = 0.0; ay = 1.0; az = 0.0;
            r = 0.5; h = 3.0;
            material = {
                type = "chessboard";
                colorA = { r = 0.0; g = 0.8; b = 0.3; };
                colorB = { r = 0.9; g = 0.9; b = 0.9; };
                scale = 1.0;
            };
        }
    );

    # Infinite cone with large pattern
    cones = (
        {
            x = -2.0; y = -1.0; z = 6.0;
            ax = 0.0; ay = 1.0; az = 0.0;
            angle = 0.4;
            material = {
                type = "chessboard";
                colorA = { r = 1.0; g = 0.0; b = 0.5; };
                colorB = { r = 1.0; g = 1.0; b = 1.0; };
                scale = 2.0;
            };
        }
    );

    # Limited cone with different pattern
    limited_cones = (
        {
            x = 2.0; y = -1.0; z = 6.0;
            ax = 0.0; ay = 1.0; az = 0.0;
            angle = 0.3;
            h = 2.5;
            material = {
                type = "chessboard";
                colorA = { r = 1.0; g = 1.0; b = 0.0; };
